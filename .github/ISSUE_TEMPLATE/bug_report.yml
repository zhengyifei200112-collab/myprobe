name: Bug report
description: Report a reproducible problem in MyProbe
title: "fix: "
body:
  - type: markdown
    attributes:
      value: Thanks for helping improve MyProbe. Do not include secrets, tokens, or unmasked addresses.
  - type: textarea
    id: summary
    attributes:
      label: Problem
      description: What happened, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      placeholder: |
        1. Configure ...
        2. Start ...
        3. Observe ...
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version or commit
      placeholder: v1.2.3 or commit SHA
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Server
        - Agent
        - Public dashboard
        - Management console
        - Deployment
        - Documentation
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, architecture, deployment method, browser, and relevant non-secret configuration.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs or screenshots
      description: Remove tokens, credentials, database contents, and complete IP addresses.
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
        - label: This report contains no secrets or sensitive infrastructure data.
          required: true
