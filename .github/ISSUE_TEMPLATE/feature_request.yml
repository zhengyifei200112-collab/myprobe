name: Feature request
description: Propose a focused, maintainable improvement
title: "feat: "
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or use case
      description: Describe the user or operator need, not only the proposed implementation.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Explain the observable behavior and acceptance criteria.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: textarea
    id: impact
    attributes:
      label: Compatibility, security, and operations
      description: Note protocol, migration, privacy, resource, or deployment implications.
  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and pull requests for similar work.
          required: true
        - label: This request does not require arbitrary remote command execution.
          required: true
