name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build embedded frontend
        run: |
          npm --prefix web ci
          npm --prefix web run build
          git diff --exit-code -- internal/webui/dist

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.26.x'
          cache-dependency-path: go.sum

      - name: Test and vet
        run: |
          go test ./...
          go vet ./...
          go build ./cmd/...

      - name: Build and validate container images
        shell: bash
        run: |
          set -euo pipefail
          docker build --target server --build-arg VERSION=ci --tag myprobe-server:ci .
          docker build --target agent --build-arg VERSION=ci --tag myprobe-agent:ci .
          test "$(docker image inspect --format '{{json .Config.Entrypoint}}' myprobe-server:ci)" = '["/usr/local/bin/myprobe-server"]'
          test "$(docker image inspect --format '{{json .Config.Entrypoint}}' myprobe-agent:ci)" = '["/usr/local/bin/myprobe-agent"]'
          test "$(docker image inspect --format '{{json .Config.Healthcheck}}' myprobe-agent:ci)" = 'null'
          docker run --rm myprobe-agent:ci --help >/dev/null
          docker run --rm --entrypoint ping myprobe-agent:ci -V >/dev/null
          MYPROBE_ADMIN_PASSWORD=test-password MYPROBE_ENCRYPTION_KEY=0123456789abcdef0123456789abcdef docker compose config --quiet
          MYPROBE_SERVER=https://status.example.com MYPROBE_TOKEN=test-token docker compose -f compose.agent.yaml config --quiet

      - name: Validate installer
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install --yes shellcheck
          bash -n install.sh scripts/install_test.sh
          shellcheck install.sh scripts/install_test.sh
          bash scripts/install_test.sh
          bash install.sh --help >/dev/null
