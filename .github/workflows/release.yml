name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: '1.26.x'
          cache-dependency-path: go.sum

      - name: Build release assets
        shell: bash
        run: |
          set -euo pipefail
          npm --prefix web ci
          npm --prefix web run build
          mkdir -p dist
          for target in linux/amd64 linux/arm64 windows/amd64; do
            os="${target%/*}"
            arch="${target#*/}"
            suffix=""
            if [ "$os" = windows ]; then suffix=".exe"; fi
            GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o "dist/myprobe-server-${os}-${arch}${suffix}" ./cmd/server
            GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 go build -trimpath -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" -o "dist/myprobe-agent-${os}-${arch}${suffix}" ./cmd/agent
          done
          for target in darwin/amd64 darwin/arm64; do
            os="${target%/*}"
            arch="${target#*/}"
            GOOS="$os" GOARCH="$arch" CGO_ENABLED=0 go build -trimpath -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" -o "dist/myprobe-agent-${os}-${arch}" ./cmd/agent
          done
          (cd dist && sha256sum myprobe-* > SHA256SUMS)

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || gh release create "$GITHUB_REF_NAME" --generate-notes --title "$GITHUB_REF_NAME"
          gh release upload "$GITHUB_REF_NAME" dist/* --clobber

      - name: Publish server and Agent container images
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          server_image="ghcr.io/${GITHUB_REPOSITORY,,}"
          agent_image="${server_image}-agent"
          version="${GITHUB_REF_NAME#v}"
          printf '%s' "$GH_TOKEN" | docker login ghcr.io --username "$GITHUB_ACTOR" --password-stdin
          docker build --target server --build-arg "VERSION=$GITHUB_REF_NAME" --tag "$server_image:$GITHUB_REF_NAME" --tag "$server_image:$version" --tag "$server_image:latest" .
          docker build --target agent --build-arg "VERSION=$GITHUB_REF_NAME" --tag "$agent_image:$GITHUB_REF_NAME" --tag "$agent_image:$version" --tag "$agent_image:latest" .
          for image in "$server_image" "$agent_image"; do
            docker push "$image:$GITHUB_REF_NAME"
            docker push "$image:$version"
            docker push "$image:latest"
          done
