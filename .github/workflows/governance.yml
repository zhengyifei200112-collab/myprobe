name: Governance

on:
  pull_request:
    branches: [main]
    types: [opened, edited, synchronize, reopened, ready_for_review]

permissions:
  contents: read
  pull-requests: read

jobs:
  pull-request-policy:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Validate pull request title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        shell: bash
        run: |
          pattern='^(feat|fix|docs|style|refactor|perf|test|build|ci|chore|revert)(\([a-z0-9._/-]+\))?!?: .+'
          if [[ ! "$PR_TITLE" =~ $pattern ]]; then
            echo "PR title must follow Conventional Commits, for example: feat(agent): add disk filters"
            exit 1
          fi

      - name: Validate source branch name
        env:
          HEAD_BRANCH: ${{ github.head_ref }}
        shell: bash
        run: |
          pattern='^(feature|fix|docs|chore|refactor|release|hotfix|agent|dependabot)/[a-z0-9][a-z0-9._/-]*$'
          if [[ ! "$HEAD_BRANCH" =~ $pattern ]]; then
            echo "Branch must use an approved short-lived prefix and lowercase descriptive name."
            exit 1
          fi
